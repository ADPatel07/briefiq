<div class="flex flex-col items-center justify-center flex-1 w-full min-h-[400px] px-6 py-12 animate-fade-in-up">

  @if (!errorMessage) {
    <!-- Clean Minimalist Loading Container -->
    <div class="flex flex-col items-center max-w-md w-full text-center">
      
      <!-- Elegant Micro-Spinner -->
      <div class="relative flex h-8 w-8 items-center justify-center mb-6">
        <svg class="animate-spin h-full w-full text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-10" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5"></circle>
          <path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </div>

      <!-- Header & Metadata -->
      <p class="text-[9px] font-bold tracking-[0.25em] text-zinc-500 uppercase select-none">Synthesizing MVP</p>
      
      <!-- Creative rotating scoping text -->
      <h3 class="text-base font-medium text-white mt-3 tracking-tight leading-relaxed min-h-[48px] max-w-sm">
        {{ currentMessage() }}
      </h3>

      <!-- Super Subtle 1px Flat Progress Line -->
      <div class="w-48 h-px bg-zinc-900 rounded-full mt-6 overflow-hidden relative">
        <div 
          class="h-full bg-white transition-all duration-700 ease-out" 
          [style.width.%]="progressPercent()"
        ></div>
      </div>
      
      <!-- Textual progress indicator -->
      <span class="text-[10px] font-mono text-zinc-500 mt-2.5 select-none tracking-wider">
        Scoping Pipeline &mdash; {{ progressPercent() }}%
      </span>

    </div>
  } @else {
    <!-- Clean Minimalist Error Card -->
    <div class="max-w-md w-full text-center flex flex-col items-center animate-fade-in-up">
      
      <!-- Minimal Error Icon -->
      <div class="flex h-10 w-10 items-center justify-center rounded-full bg-zinc-950 border border-zinc-800 text-zinc-400 mb-5 select-none">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>

      <p class="text-[9px] font-bold tracking-[0.2em] text-zinc-500 uppercase select-none">Interrupt</p>
      <h3 class="text-base font-semibold text-white mt-2 tracking-tight">Generation Suspended</h3>
      
      <!-- Error snippet -->
      <p class="mt-3 text-[12px] text-zinc-400 leading-relaxed max-w-xs font-mono p-3 bg-zinc-950 border border-zinc-900 rounded-lg">
        {{ errorMessage }}
      </p>

      <!-- Minimal buttons -->
      <div class="mt-6 flex items-center justify-center gap-3 w-full">
        <button
          type="button"
          class="inline-flex min-h-[34px] items-center justify-center rounded bg-white hover:bg-zinc-200 text-black px-4 text-[11px] font-bold transition active:scale-[0.98] cursor-pointer"
          (click)="retry.emit()"
        >
          Retry
        </button>
        <button
          type="button"
          class="inline-flex min-h-[34px] items-center justify-center rounded bg-transparent hover:bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-white px-4 text-[11px] font-bold transition active:scale-[0.98] cursor-pointer"
          (click)="startOver.emit()"
        >
          Start Over
        </button>
      </div>
    </div>
  }

</div>
