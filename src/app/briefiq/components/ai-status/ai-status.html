@if (loadingMessage) {
  <div
    class="flex items-center gap-3.5 rounded-lg border border-zinc-800 bg-zinc-950 px-4 py-3 text-[12px] text-zinc-400 relative overflow-hidden animate-fade-in-up"
    role="status"
    aria-live="polite"
  >
    <!-- Simple high-end thin infinite monochrome loading line on the very bottom edge -->
    <div class="absolute bottom-0 left-0 h-[1.5px] w-full bg-zinc-900 overflow-hidden">
      <div class="h-full w-1/3 bg-white rounded-full animate-[loading-bar_1.5s_infinite_linear]"></div>
    </div>

    <!-- Small elegant spinner -->
    <span class="relative flex h-3.5 w-3.5 shrink-0">
      <svg class="animate-spin h-full w-full text-white" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
        <path class="opacity-80" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </span>
    <span class="font-medium text-white select-none">{{ loadingMessage }}</span>
  </div>
}

@if (errorMessage) {
  <div
    class="rounded-lg border border-zinc-700 bg-zinc-900 p-4 text-[12px] text-zinc-300 animate-fade-in-up"
    role="alert"
  >
    <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-start gap-3">
        <svg class="h-4 w-4 shrink-0 text-zinc-400 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <div>
          <p class="font-bold text-white">System Diagnostic Alert</p>
          <p class="mt-1 text-[11px] text-zinc-400 leading-relaxed">{{ errorMessage }}</p>
        </div>
      </div>
      
      <button
        type="button"
        class="inline-flex min-h-[32px] items-center justify-center rounded-md bg-white hover:bg-zinc-200 text-black px-4 text-[11px] font-bold transition active:scale-[0.98] cursor-pointer shrink-0"
        (click)="retry.emit()"
      >
        Retry
      </button>
    </div>
  </div>
}
